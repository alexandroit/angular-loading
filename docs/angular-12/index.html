<!DOCTYPE html><html lang="en"><head>
    <meta charset="utf-8">
    <title>@revivejs/angular-loading · Angular 12</title>
    <base href="./">
    <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>body,html{margin:0;min-height:100%;font-family:Segoe UI,Arial,sans-serif;background:radial-gradient(circle at top left,#3b82f629,#0000 28%),linear-gradient(180deg,#f8fbff,#edf4ff);color:#0f172a}body{min-height:100vh}.boot-shell{display:grid;place-items:center;min-height:100vh;padding:24px}.boot-card{display:grid;place-items:center;grid-gap:16px;gap:16px;padding:28px 32px;border-radius:24px;border:1px solid #0f172a14;background:#ffffffeb;box-shadow:0 18px 48px #0f172a14}.boot-loader{width:42px;height:42px;border-radius:999px;border:3px solid #2563eb2e;border-top-color:#2563eb;animation:spin .9s linear infinite}@keyframes spin{to{transform:rotate(1turn)}}</style><link rel="stylesheet" href="styles.css" media="print" onload="this.media='all'"><noscript><link rel="stylesheet" href="styles.css"></noscript></head>
  <body>
    <app-root>
      <div class="boot-shell">
        <div class="boot-card">
          <div class="boot-loader"></div>
          <p>Booting Angular 12 docs…</p>
        </div>
      </div>
    </app-root>
  <script src="runtime.js" defer></script><script src="polyfills.js" defer></script><script src="vendor.js" defer></script><script src="main.js" defer></script>

</body></html>
